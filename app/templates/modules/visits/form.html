{% extends "base.html" %}
{% block title %}{{ 'Edit' if action == 'edit' else 'New' }} Visit{% endblock %}
{% block page_title %}{{ 'Edit' if action == 'edit' else 'New' }} Visit{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Patient *</label>
                    <select class="form-select" name="patient_lookup" required>
                        <option value="">Select Patient...</option>
                        {% for p in patients %}
                        <option value="{{ p.id }}" {{ 'selected' if visit and visit.data.get('patient_lookup') == p.id }}>
                            {{ p.data.get('first_name', '') }} {{ p.data.get('last_name', '') }} — {{ p.data.get('phone', '') }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Doctor *</label>
                    <select class="form-select" name="doctor_lookup" required>
                        <option value="">Select Doctor...</option>
                        {% for d in doctors %}
                        <option value="{{ d.id }}" {{ 'selected' if visit and visit.data.get('doctor_lookup') == d.id }}>
                            {{ d.data.get('full_name', '') }} — {{ d.data.get('department', '') }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Visit Date *</label>
                    <input type="datetime-local" class="form-control" name="visit_date" required
                           value="{{ visit.data.get('visit_date', '') if visit else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Department *</label>
                    <select class="form-select" name="department" required>
                        <option value="">Select...</option>
                        {% for d in ['General', 'Cardiology', 'Orthopedics', 'Pediatrics', 'Neurology', 'Oncology', 'Emergency', 'Surgery'] %}
                        <option value="{{ d }}" {{ 'selected' if visit and visit.data.get('department') == d }}>{{ d }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-12">
                    <label class="form-label">Chief Complaint *</label>
                    <input type="text" class="form-control" name="chief_complaint" required
                           value="{{ visit.data.get('chief_complaint', '') if visit else '' }}">
                </div>
                <div class="col-md-12">
                    <label class="form-label">Diagnosis</label>
                    <textarea class="form-control" name="diagnosis" rows="2">{{ visit.data.get('diagnosis', '') if visit else '' }}</textarea>
                </div>
                <div class="col-md-12">
                    <label class="form-label">Treatment</label>
                    <textarea class="form-control" name="treatment" rows="2">{{ visit.data.get('treatment', '') if visit else '' }}</textarea>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Blood Pressure</label>
                    <input type="text" class="form-control" name="vitals_bp" placeholder="120/80"
                           value="{{ visit.data.get('vitals_bp', '') if visit else '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Temperature</label>
                    <input type="text" class="form-control" name="vitals_temp" placeholder="98.6F"
                           value="{{ visit.data.get('vitals_temp', '') if visit else '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Pulse Rate</label>
                    <input type="text" class="form-control" name="vitals_pulse" placeholder="72 bpm"
                           value="{{ visit.data.get('vitals_pulse', '') if visit else '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Weight</label>
                    <input type="text" class="form-control" name="vitals_weight" placeholder="70 kg"
                           value="{{ visit.data.get('vitals_weight', '') if visit else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Status *</label>
                    <select class="form-select" name="status" required>
                        {% for s in ['Scheduled', 'In-Progress', 'Completed', 'Cancelled'] %}
                        <option value="{{ s }}" {{ 'selected' if visit and visit.data.get('status') == s }}>{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Notes</label>
                    <textarea class="form-control" name="notes" rows="2">{{ visit.data.get('notes', '') if visit else '' }}</textarea>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-check-lg"></i> {{ 'Update' if action == 'edit' else 'Create' }} Visit
                </button>
                <a href="{{ url_for('modules.visits_list') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
