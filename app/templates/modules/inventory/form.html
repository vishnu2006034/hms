{% extends "base.html" %}
{% block title %}{{ 'Edit' if action == 'edit' else 'New' }} Inventory Item{% endblock %}
{% block page_title %}{{ 'Edit' if action == 'edit' else 'New' }} Inventory Item{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Item Name *</label>
                    <input type="text" class="form-control" name="item_name" required
                           value="{{ item.data.get('item_name', '') if item else '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Category *</label>
                    <select class="form-select" name="category" required>
                        <option value="">Select...</option>
                        {% for c in ['Medication', 'Equipment', 'Consumable', 'Surgical'] %}
                        <option value="{{ c }}" {{ 'selected' if item and item.data.get('category') == c }}>{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Status *</label>
                    <select class="form-select" name="status" required>
                        {% for s in ['In-Stock', 'Low-Stock', 'Out-of-Stock', 'Expired'] %}
                        <option value="{{ s }}" {{ 'selected' if item and item.data.get('status') == s }}>{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-12">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" name="description" rows="2">{{ item.data.get('description', '') if item else '' }}</textarea>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Quantity *</label>
                    <input type="number" class="form-control" name="quantity" required
                           value="{{ item.data.get('quantity', '0') if item else '0' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Unit *</label>
                    <select class="form-select" name="unit" required>
                        <option value="">Select...</option>
                        {% for u in ['Box', 'Bottle', 'Piece', 'Strip', 'Vial'] %}
                        <option value="{{ u }}" {{ 'selected' if item and item.data.get('unit') == u }}>{{ u }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Unit Price *</label>
                    <input type="number" step="0.01" class="form-control" name="unit_price" required
                           value="{{ item.data.get('unit_price', '0') if item else '0' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Reorder Level</label>
                    <input type="number" class="form-control" name="reorder_level"
                           value="{{ item.data.get('reorder_level', '0') if item else '0' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Supplier</label>
                    <input type="text" class="form-control" name="supplier"
                           value="{{ item.data.get('supplier', '') if item else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Expiry Date</label>
                    <input type="date" class="form-control" name="expiry_date"
                           value="{{ item.data.get('expiry_date', '') if item else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Batch Number</label>
                    <input type="text" class="form-control" name="batch_number"
                           value="{{ item.data.get('batch_number', '') if item else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Location</label>
                    <input type="text" class="form-control" name="location"
                           value="{{ item.data.get('location', '') if item else '' }}">
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-warning">
                    <i class="bi bi-check-lg"></i> {{ 'Update' if action == 'edit' else 'Create' }} Item
                </button>
                <a href="{{ url_for('inventory.inventory_list') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
